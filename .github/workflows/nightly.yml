name: Nightly Flutter Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for commits in last 24h
        id: changes
        run: |
          COMMITS=$(git rev-list --count --since="24 hours ago" HEAD)
          echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"

      - name: Stop if no changes
        if: steps.changes.outputs.commits == '0'
        run: |
          echo "No changes in last 24h. Skipping build."
          exit 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Android SDK and install packages
        env:
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          ANDROID_HOME: /home/runner/android-sdk
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$PATH"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --version
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Use preinstalled Flutter 3.38.4
        env:
          FLUTTER_ROOT: /home/runner/actions-runner/_work/_tool/flutter/stable-3.38.4-x64
        run: |
          export PATH="$FLUTTER_ROOT/bin:$PATH"
          flutter --version | head -n 1
          flutter --version | grep -q "Flutter 3.38.4"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: build/app/outputs/flutter-apk/app-release.apk
