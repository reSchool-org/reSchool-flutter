name: Nightly Flutter Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: Linux

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        run: |
          COMMITS=$(git rev-list --count --since="24 hours ago" HEAD)
          echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"

      - if: steps.changes.outputs.commits == '0'
        run: |
          echo "No changes in last 24h. Skipping build."

      - if: steps.changes.outputs.commits != '0'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - if: steps.changes.outputs.commits != '0'
        env:
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          ANDROID_HOME: /home/runner/android-sdk
          FLUTTER_ROOT: /home/runner/actions-runner/_work/_tool/flutter/stable-3.38.4-x64
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/emulator" >> "$GITHUB_PATH"
          echo "$FLUTTER_ROOT/bin" >> "$GITHUB_PATH"
          export PATH="$FLUTTER_ROOT/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$PATH"
          flutter --version | head -n 1
          flutter --version | grep -q "Flutter 3.38.4"
          sdkmanager --version
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - if: steps.changes.outputs.commits != '0'
        run: flutter pub get

      - if: steps.changes.outputs.commits != '0'
        run: flutter build apk --release

      - if: steps.changes.outputs.commits != '0'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: build/app/outputs/flutter-apk/app-release.apk
